<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わんにゃんまんまカレンダー">
  <meta name="theme-color" content="#FF8C69">
  <link rel="manifest" href="calendar-manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わんにゃんまんま">
  <title>わんにゃんまんまカレンダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #FF8C69; --primary-light: #FFD4C2; --primary-dark: #E05C30;
      --accent: #FFB347; --bg: #FFF8F5; --card: #FFFFFF;
      --text: #3D2B1F; --text-light: #8B6959; --border: #F0D5C8;
      --today: #FF8C69; --radius: 16px;
    }
    body { font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 2px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(255,140,105,0.3); }
    .header-title { font-size: 16px; font-weight: 800; color: white; letter-spacing: 0.2px; text-shadow: 0 1px 4px rgba(0,0,0,0.15); padding: 0 6px; white-space: nowrap; }
    .pet-circle { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.2); flex-shrink: 0; }

    /* Month Nav */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card); border-bottom: 1px solid var(--border); }
    .month-nav button { background: var(--primary-light); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .month-nav button:active { background: var(--primary); color: white; transform: scale(0.92); }
    .month-label { font-size: 22px; font-weight: 700; color: var(--text); }

    /* Calendar */
    .calendar-wrapper { padding: 0 8px calc(70px + env(safe-area-inset-bottom)) 8px; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 6px 0 3px; }
    .weekday { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 0; }
    .weekday.sun { color: #E05C30; }
    .weekday.sat { color: #4A90D9; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-cell { background: var(--card); border-radius: 12px; aspect-ratio: 1 / 1.25; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; cursor: pointer; overflow: hidden; border: 2px solid transparent; position: relative; transition: transform 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .day-cell:active { transform: scale(0.93); }
    .day-cell.empty { background: transparent; box-shadow: none; cursor: default; }
    .day-cell.today { border-color: var(--today); background: #FFF3EE; }
    .day-cell.has-photo { border-color: var(--primary-light); }
    .day-number { font-size: 11px; font-weight: 600; padding: 3px 0 2px; color: var(--text); z-index: 1; position: relative; line-height: 1; }
    .day-cell.sun .day-number { color: #E05C30; }
    .day-cell.sat .day-number { color: #4A90D9; }
    .day-cell.today .day-number { background: var(--today); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    .day-photo { width: 100%; flex: 1; object-fit: cover; display: block; }
    .day-photo-count { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,0.55); color: white; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 4px; line-height: 1.4; }
    .day-memo-indicator { position: absolute; bottom: 3px; left: 3px; background: var(--accent); border-radius: 50%; width: 6px; height: 6px; }

    /* Stats */
    .stats-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 -2px 12px rgba(0,0,0,0.06); padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .stat-item { text-align: center; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 10px; color: var(--text-light); margin-top: 1px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 28px 28px 0 0; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; padding: 24px 20px; padding-bottom: max(24px, env(safe-area-inset-bottom)); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-date { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 16px; }

    /* Multi-photo grid */
    .photo-section-label { font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 8px; }
    .photo-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .photo-grid::-webkit-scrollbar { display: none; }
    .photo-thumb { position: relative; flex-shrink: 0; width: 96px; height: 96px; border-radius: 12px; overflow: hidden; background: var(--bg); border: 2px solid var(--border); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .photo-add-btn { flex-shrink: 0; width: 96px; height: 96px; border-radius: 12px; border: 2px dashed var(--primary-light); background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--primary); font-size: 28px; transition: background 0.15s; }
    .photo-add-btn:active { background: var(--primary-light); }
    .photo-add-label { font-size: 10px; font-weight: 600; color: var(--primary); }
    .photo-empty { width: 100%; padding: 28px 0; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-light); cursor: pointer; }
    .photo-empty-icon { font-size: 40px; opacity: 0.5; }
    .photo-empty-text { font-size: 13px; }

    /* Memo */
    .memo-label { font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; }
    .memo-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 15px; font-family: inherit; color: var(--text); resize: none; min-height: 80px; outline: none; transition: border-color 0.2s; }
    .memo-input:focus { border-color: var(--primary); }
    .memo-input::placeholder { color: var(--text-light); opacity: 0.7; }

    /* Actions */
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel { flex: 1; background: var(--bg); color: var(--text-light); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save { flex: 2; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(255,140,105,0.4); transition: opacity 0.2s; }
    .btn-save:disabled { opacity: 0.6; }
    .saving-indicator { text-align: center; font-size: 13px; color: var(--text-light); margin-top: 8px; display: none; }
    #fileInput { display: none; }
    .modal::-webkit-scrollbar { display: none; }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 400; display: none; flex-direction: column; align-items: center; }
    .lightbox.open { display: flex; }
    .lightbox-scroll { width: 100%; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 56px 0 32px; gap: 10px; }
    .lightbox-photo-row { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
    .lightbox-photo-row img { max-width: 86vw; max-height: 58vh; object-fit: contain; border-radius: 10px; touch-action: pan-y; user-select: none; }
    .lightbox-counter { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; min-height: 18px; }
    .lightbox-close { position: fixed; top: 12px; right: 14px; background: rgba(255,255,255,0.18); border: none; color: white; font-size: 22px; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .lightbox-nav { background: rgba(255,255,255,0.18); border: none; color: white; font-size: 32px; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
    .lightbox-info { background: rgba(255,255,255,0.1); border-radius: 18px; padding: 16px; width: 86vw; }
    .lightbox-info-date { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 6px; }
    .lightbox-info-memo { color: white; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
    .lightbox-info-memo.empty { color: rgba(255,255,255,0.35); font-style: italic; }
    .lightbox-edit-btn { display: block; width: 100%; background: linear-gradient(135deg, #FF8C69, #FFB347); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px; }

    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    /* PWA install guide */
    .pwa-guide { position:fixed; bottom:70px; left:12px; right:12px; background:white; border-radius:16px; padding:14px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.18); z-index:310; display:none; }
    .pwa-guide.show { display:block; }
    .pwa-guide-title { font-size:14px; font-weight:800; color:var(--text); margin-bottom:6px; }
    .pwa-guide-text { font-size:12px; color:var(--text-light); line-height:1.6; }
    .pwa-guide-close { position:absolute; top:10px; right:12px; background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-light); }

    /* Reminder banner */
    .reminder-banner { background: linear-gradient(135deg,#FF8C69,#FFB347); color:white; text-align:center; padding:10px 16px; font-size:14px; font-weight:700; display:none; cursor:pointer; }
    .reminder-banner.show { display:block; }
    /* Streak bar */
    .streak-bar { background:var(--card); border-bottom:1px solid var(--border); padding:7px 16px; display:flex; align-items:center; justify-content:space-between; }
    .streak-info { font-size:13px; font-weight:700; color:var(--text); }
    .streak-badge { font-size:11px; background:var(--primary-light); color:var(--primary-dark); padding:3px 9px; border-radius:12px; font-weight:700; display:none; }
    /* Balance chart */
    .balance-section { padding:6px 16px 4px; border-top:1px solid var(--border); width:100%; box-sizing:border-box; }
    .balance-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
    .balance-name { font-size:12px; font-weight:700; color:var(--text); min-width:48px; }
    .balance-track { flex:1; height:8px; background:var(--bg); border-radius:4px; overflow:hidden; }
    .balance-fill-a { height:100%; background:#FF8C69; border-radius:4px; width:0; transition:width 0.6s; }
    .balance-fill-b { height:100%; background:#4A90D9; border-radius:4px; width:0; transition:width 0.6s; }
    .balance-count { font-size:11px; color:var(--text-light); min-width:20px; text-align:right; }
    /* Author badge on cell */
    .author-badge { position:absolute; bottom:2px; right:2px; width:13px; height:13px; border-radius:50%; font-size:7px; font-weight:700; display:flex; align-items:center; justify-content:center; color:white; border:1.5px solid white; line-height:1; }
    .au-a { background:#FF8C69; }
    .au-b { background:#4A90D9; }
    /* Author selector in modal */
    .author-select { display:flex; gap:8px; margin-bottom:12px; }
    .author-btn { flex:1; padding:9px; border:2px solid var(--border); border-radius:12px; background:var(--card); font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .sel-a { border-color:#FF8C69 !important; background:#FFF0EB !important; color:#FF8C69 !important; }
    .sel-b { border-color:#4A90D9 !important; background:#EBF3FF !important; color:#4A90D9 !important; }
    /* Quick tags */
    .quick-tags-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .quick-tag { background:var(--primary-light); color:var(--primary-dark); border:none; border-radius:16px; padding:5px 11px; font-size:12px; font-weight:600; cursor:pointer; }
    .quick-tag:active { background:var(--primary); color:white; }

    /* Reactions */
    .reaction-bar { display:flex; justify-content:center; gap:12px; margin:10px 0 4px; }
    .reaction-btn { border:2px solid var(--border); background:var(--bg); border-radius:20px; padding:7px 18px; font-size:15px; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:6px; font-weight:700; color:var(--text-light); }
    .reaction-btn.active-a { border-color:#FF8C69; background:#FFF3EE; color:#E05C30; }
    .reaction-btn.active-b { border-color:#9B59B6; background:#F5EEFB; color:#7D3C98; }
    .reaction-btn:active { transform:scale(0.9); }
    .reaction-count { font-size:12px; }
    .day-reactions { display:flex; gap:2px; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); }
    .day-react-dot { font-size:9px; line-height:1; }

    /* Calendar reaction popup */
    .react-popup { position:fixed; z-index:500; background:white; border-radius:20px; box-shadow:0 6px 24px rgba(0,0,0,0.2); padding:10px 14px; display:flex; gap:10px; align-items:center; transform:scale(0.7); opacity:0; pointer-events:none; transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s; }
    .react-popup.open { transform:scale(1); opacity:1; pointer-events:auto; }
    .react-popup-btn { background:none; border:2px solid var(--border); border-radius:16px; padding:6px 14px; font-size:18px; cursor:pointer; transition:all 0.15s; }
    .react-popup-btn.on-a { border-color:#FF8C69; background:#FFF3EE; }
    .react-popup-btn.on-b { border-color:#9B59B6; background:#F5EEFB; }
    .react-popup-btn:active { transform:scale(0.85); }

    /* Confetti */
    .confetti-overlay { position:fixed; inset:0; z-index:2000; pointer-events:none; }
    .confetti-msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:2001; background:white; border-radius:24px; padding:18px 32px; font-size:20px; font-weight:800; color:var(--primary-dark); box-shadow:0 8px 32px rgba(0,0,0,0.2); white-space:nowrap; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; }
    .confetti-msg.show { transform:translate(-50%,-50%) scale(1); }

    /* Pet fullscreen overlay */

    /* Login Screen */
    #loginScreen { position:fixed; inset:0; background:var(--bg); z-index:9999; display:none; align-items:center; justify-content:center; padding:20px; }
    .login-card { background:white; border-radius:24px; padding:32px 24px; width:100%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,0.12); text-align:center; }
    .login-icon { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--primary-light); margin-bottom:16px; }
    .login-title { font-size:18px; font-weight:800; color:var(--text); margin-bottom:4px; }
    .login-subtitle { font-size:13px; color:var(--text-light); margin-bottom:24px; }
    .login-input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px; font-size:15px; font-family:inherit; color:var(--text); outline:none; margin-bottom:10px; transition:border-color 0.2s; display:block; box-sizing:border-box; }
    .login-input:focus { border-color:var(--primary); }
    .login-btn { width:100%; background:linear-gradient(135deg,var(--primary),var(--accent)); color:white; border:none; border-radius:var(--radius); padding:15px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:4px; transition:opacity 0.2s; }
    .login-btn:disabled { opacity:0.6; }
    .login-error { font-size:13px; color:#E05C30; margin-top:10px; min-height:18px; }
    .logout-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.22); border:none; color:white; font-size:11px; font-weight:700; padding:5px 10px; border-radius:12px; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
<div id="loginScreen">
  <div class="login-card">
    <img class="login-icon" src="dogcat.jpg.png" alt="わんにゃん">
    <div class="login-title">わんにゃんまんまカレンダー</div>
    <div class="login-subtitle">ふたりのごはん記録 🐶😸</div>
    <input class="login-input" type="email" id="loginEmail" placeholder="メールアドレス" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()">
    <input class="login-input" type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

// ── Image compress ─────────────────────────────────────
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 900;
        let w = img.width, h = img.height;
        if (w > h) { if (w > max) { h = h * max / w; w = max; } }
        else        { if (h > max) { w = w * max / h; h = max; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fitCalendarRows() {
  const grid = document.getElementById('calendarGrid');

  const weekdaysEl = document.querySelector('.weekdays');
  if (!grid || !wrapper || !weekdaysEl) return;
  const numCells = grid.children.length;
  const numRows = Math.ceil(numCells / 7);
  const gap = 4;
  const cs = getComputedStyle(wrapper);
  const padTop = parseFloat(cs.paddingTop) || 0;
  const padBot = parseFloat(cs.paddingBottom) || 0;
  const available = wrapper.clientHeight - padTop - padBot - weekdaysEl.offsetHeight - gap * (numRows - 1);
  const rowH = Math.max(44, Math.floor(available / numRows));
  grid.style.gridTemplateRows = `repeat(${numRows}, ${rowH}px)`;
}

    if (hasAnyEntry(allData[k])) { streak++; d.setDate(d.getDate() - 1); }

}

// ── 通知 / PWA ─────────────────────────────────────────
let _swReg = null;

async function setupPWA() {
  if (!('serviceWorker' in navigator)) return;
  try {
    _swReg = await navigator.serviceWorker.register('./sw.js');
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'CHECK_AND_NOTIFY') checkAndNotify();
    });
  } catch(err) {}
}
setupPWA();

async function subscribePush() {
  if (!_swReg || !('PushManager' in window)) return null;
  try {
    let sub = await _swReg.pushManager.getSubscription();
    if (!sub) {
      sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    if (db) await db.ref(`push_subscriptions/${currentAuthor}`).set(JSON.parse(JSON.stringify(sub)));
    return sub;
  } catch(err) { return null; }
}

async function sendPushToOther(title, body, from) {
  if (!db) return;
  const sender = from || currentAuthor;
  const other = sender === 'A' ? 'B' : 'A';
  try {
    const snap = await db.ref(`push_subscriptions/${other}`).once('value');
    const sub = snap.val();
    if (!sub) return;
    await fetch('/api/send-notification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: sub, title, body })
    });
  } catch(err) {}
}

async function requestNotify() {
  if (!('Notification' in window)) {
    showToast('このブラウザは通知非対応です');
    return;
  }
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!isStandalone && /iPhone|iPad/.test(navigator.userAgent)) {
    document.getElementById('pwaGuide').classList.add('show');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    await subscribePush();
    showToast('🔔 通知を設定しました！毎日20時にお知らせします');
    if (_swReg?.active) _swReg.active.postMessage({ type: 'SCHEDULE_REMINDER' });
    checkAndNotify();
  } else {
    showToast('通知が許可されませんでした');
  }
}

function checkAndNotify() {
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  if (now.getHours() < 18) return;
  const k = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  if (!hasAnyEntry(allData[k]) && _swReg?.active) {
    _swReg.active.postMessage({ type: 'SHOW_REMINDER' });
  }
}

// ── Confetti ───────────────────────────────────────────
function showConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const msg    = document.getElementById('confettiMsg');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  msg.classList.add('show');

  const colors = ['#FF8C69','#FFB347','#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF'];
  const pieces = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: 8 + Math.random() * 8,
    h: 5 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 3 + Math.random() * 4,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.2
  }));

  let frame;
  const draw = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame = requestAnimationFrame(draw);
  };
  draw();

  setTimeout(() => {
    cancelAnimationFrame(frame);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    msg.classList.remove('show');
  }, 2200);
}

// データ読み込み後に通知チェック（Firebase接続後に呼ぶ）
function onDataLoaded() {
  updateBanner();
  updateStreakUI();
  updateBalance();
  checkAndNotify();
}

function updateStats() {
  const allKeys   = Object.keys(allData);
  const monthKeys = allKeys.filter(k => {
    const [y, m] = k.split('-').map(Number);
    return y === currentYear && m === currentMonth + 1;
  });
  document.getElementById('statMonth').textContent = monthKeys.filter(k => hasAnyEntry(allData[k])).length;
  document.getElementById('statTotal').textContent  = allKeys.filter(k => hasAnyEntry(allData[k])).length;
}

// ── Photo grid (modal) ─────────────────────────────────
function renderPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';

  if (currentPhotos.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'photo-empty';
    empty.innerHTML = '<div class="photo-empty-icon">🍽️</div><div class="photo-empty-text">タップして写真を追加</div>';
    empty.addEventListener('click', () => document.getElementById('fileInput').click());
    grid.appendChild(empty);
    return;
  }

  currentPhotos.forEach((src, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';

    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', () => openLightboxMulti(currentPhotos, i));
    thumb.appendChild(img);

    const del = document.createElement('button');
    del.className = 'photo-thumb-del';
    del.textContent = '✕';
    del.addEventListener('click', e => { e.stopPropagation(); currentPhotos.splice(i, 1); renderPhotoGrid(); });
    thumb.appendChild(del);

    grid.appendChild(thumb);
  });

  if (currentPhotos.length < MAX_PHOTOS) {
    const addBtn = document.createElement('div');
    addBtn.className = 'photo-add-btn';
    addBtn.innerHTML = '<span>＋</span><span class="photo-add-label">追加</span>';
    addBtn.addEventListener('click', () => document.getElementById('fileInput').click());
    grid.appendChild(addBtn);
  }
}

// ── Modal ──────────────────────────────────────────────
function openModal(key, day) {
  selectedKey = key;
  const [y, m, d] = key.split('-').map(Number);
  const dow = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
  document.getElementById('modalDate').textContent = `${y}年${m}月${d}日（${dow}）`;

  const entry = allData[key] || {};
  _modalDrafts = {
    A: { photos: [...getPhotos(entry, 'A')], memo: getMemo(entry, 'A') },
    B: { photos: [...getPhotos(entry, 'B')], memo: getMemo(entry, 'B') }
  };
  currentAuthor = 'A';
  document.getElementById('authorBtnA').className = 'author-btn sel-a';
  document.getElementById('authorBtnB').className = 'author-btn';
  loadAuthorDraft('A');
  renderQuickTags();
  document.getElementById('savingIndicator').style.display = 'none';
  document.getElementById('saveBtn').disabled = false;

  renderReactionBar(key);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selectedKey = null;
  currentPhotos = [];
}

// File input
document.getElementById('fileInput').addEventListener('change', async function(e) {
  const files = Array.from(e.target.files);
  const remaining = MAX_PHOTOS - currentPhotos.length;
  const toProcess = files.slice(0, remaining);
  for (const file of toProcess) {
    const b64 = await compressImage(file);
    currentPhotos.push(b64);
  }
  if (files.length > remaining) showToast(`⚠️ 最大${MAX_PHOTOS}枚までです`);
  renderPhotoGrid();
  this.value = '';
});

// Save
document.getElementById('saveBtn').addEventListener('click', async () => {
  // 現在編集中のauthorのドラフトを確定
  _modalDrafts[currentAuthor] = {
    photos: [...currentPhotos],
    memo: document.getElementById('memoInput').value.trim()
  };

  const saveBtn = document.getElementById('saveBtn');
  const indicator = document.getElementById('savingIndicator');
  saveBtn.disabled = true;
  indicator.style.display = 'block';

  const key = selectedKey;
  let anyPosted = false;

  if (db) {
    setSyncStatus('syncing');
    for (const who of ['A', 'B']) {
      const d = _modalDrafts[who];
      if (d.photos.length > 0 || d.memo) {
        await db.ref(`entries/${key}/${who}`).set({ photos: d.photos, memo: d.memo });
        anyPosted = true;
      } else {
        await db.ref(`entries/${key}/${who}`).remove();
      }
    }
    setSyncStatus('online');
    // 相手にプッシュ通知（何か投稿があれば）
    if (anyPosted) {
      const mySound = currentAuthor === 'A' ? 'ワオン' : 'ニャオン';
      const myName  = currentAuthor === 'A' ? USER_A_NAME : USER_B_NAME;
      sendPushToOther('🐾 わんにゃんまんまカレンダー', `${myName}がごはん食べた${mySound}。`);
    }
  } else {
    for (const who of ['A', 'B']) {
      const d = _modalDrafts[who];
      if (!allData[key]) allData[key] = {};
      if (d.photos.length > 0 || d.memo) {
        allData[key][who] = { photos: d.photos, memo: d.memo };
        anyPosted = true;
      } else {
        delete allData[key][who];
      }
    }
    if (!hasAnyEntry(allData[key])) delete allData[key];
    saveLocal();
    renderCalendar();
  }

  indicator.style.display = 'none';
  saveBtn.disabled = false;
  closeModal();

  if (anyPosted) {
    showConfetti();
  } else {
    showToast('🗑️ 投稿を削除しました');
  }
});

document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── Lightbox ───────────────────────────────────────────
let _lbPhotos = [], _lbIdx = 0, _lbKey = null;

function openLightbox(src) { openLightboxMulti([src], 0, null); }

function openLightboxMulti(photos, idx, dateKey) {
  _lbPhotos = photos; _lbIdx = idx; _lbKey = dateKey;
  document.getElementById('lightbox').classList.add('open');
  lbUpdate();
}

function lbUpdate() {
  const img    = document.getElementById('lightboxImg');
  const prev   = document.getElementById('lightboxPrev');
  const next   = document.getElementById('lightboxNext');
  const counter= document.getElementById('lightboxCounter');
  const info   = document.getElementById('lightboxInfo');
  const dateEl = document.getElementById('lightboxDate');
  const memoEl = document.getElementById('lightboxMemo');

  img.src = _lbPhotos[_lbIdx];
  const multi = _lbPhotos.length > 1;
  prev.style.display = multi ? 'flex' : 'none';
  next.style.display = multi ? 'flex' : 'none';
  counter.textContent = multi ? `${_lbIdx + 1} / ${_lbPhotos.length}` : '';

  if (_lbKey) {
    info.style.display = 'block';
    const [y, m, d] = _lbKey.split('-');
    const dow = ['日','月','火','水','木','金','土'][new Date(_lbKey).getDay()];
    dateEl.textContent = `${y}年${+m}月${+d}日（${dow}）`;
    const memo = (allData[_lbKey] || {}).memo || '';
    memoEl.textContent = memo || 'メモなし';
    memoEl.className = 'lightbox-info-memo' + (memo ? '' : ' empty');
  } else {
    info.style.display = 'none';
  }
}

document.getElementById('lightboxPrev').addEventListener('click', e => {
  e.stopPropagation();
  _lbIdx = (_lbIdx - 1 + _lbPhotos.length) % _lbPhotos.length;
  lbUpdate();
});
document.getElementById('lightboxNext').addEventListener('click', e => {
  e.stopPropagation();
  _lbIdx = (_lbIdx + 1) % _lbPhotos.length;
  lbUpdate();
});
document.getElementById('lightboxEditBtn').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
  if (_lbKey) openModal(_lbKey, +_lbKey.split('-')[2]);
});
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

// スワイプ操作
let _lbTouchX = 0, _lbTouchY = 0;
const _lbImg = document.getElementById('lightboxImg');
_lbImg.addEventListener('touchstart', e => {
  _lbTouchX = e.touches[0].clientX;
  _lbTouchY = e.touches[0].clientY;
}, { passive: true });
_lbImg.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _lbTouchX;
  const dy = e.changedTouches[0].clientY - _lbTouchY;
  // 上下スワイプで閉じる（縦方向が優先）
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) {
    document.getElementById('lightbox').classList.remove('open');
    return;
  }
  if (Math.abs(dx) > 40 && _lbPhotos.length > 1) {
    _lbIdx = dx < 0
      ? (_lbIdx + 1) % _lbPhotos.length
      : (_lbIdx - 1 + _lbPhotos.length) % _lbPhotos.length;
    lbUpdate();
  }
});

// ── Month nav ──────────────────────────────────────────
document.getElementById('prevMonth').addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); });
document.getElementById('nextMonth').addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); });
