<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わんにゃんお買い物">
  <meta name="theme-color" content="#FF8C69">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>わんにゃんお買い物メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --wan: #4A90D9; --wan-light: #C8E0F8;
      --nyan: #E05C9A; --nyan-light: #F8C8E0;
      --primary: #FF8C69; --primary-light: #FFD4C2; --primary-dark: #E05C30;
      --accent: #FFB347;
      --bg: #FFF8F5; --card: #FFFFFF;
      --text: #3D2B1F; --text-light: #8B6959; --border: #F0D5C8;
      --radius: 16px;
    }
    body { font-family: -apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(255,140,105,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-img {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .header-title { font-size: 16px; font-weight: 800; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .header-subtitle { font-size: 10px; color: rgba(255,255,255,0.85); margin-top: 1px; }
    .sync-badge {
      font-size: 20px; color: white;
      background: rgba(255,255,255,0.22); border: none; border-radius: 50%;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.4s;
    }
    .sync-badge.spinning { transform: rotate(360deg); }

    /* ── Input Panel ── */
    .input-panel {
      background: var(--card);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .user-toggle-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .user-btn {
      flex: 1; display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 14px; border: 2.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.18s; font-family: inherit;
    }
    .user-btn.active.wan { border-color: var(--wan); background: var(--wan-light); }
    .user-btn.active.nyan { border-color: var(--nyan); background: var(--nyan-light); }
    .user-btn img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .user-btn-label { font-size: 13px; font-weight: 700; color: var(--text-light); }
    .user-btn.active.wan .user-btn-label { color: var(--wan); }
    .user-btn.active.nyan .user-btn-label { color: var(--nyan); }
    .user-btn:active { transform: scale(0.96); }

    .input-row { display: flex; gap: 8px; align-items: center; }
    .text-input {
      flex: 1; background: var(--bg); border: 2px solid var(--border);
      border-radius: 14px; padding: 11px 14px; font-size: 15px;
      font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary); }
    .text-input::placeholder { color: var(--text-light); opacity: 0.6; }
    .qty-input {
      width: 68px; background: var(--bg); border: 2px solid var(--border);
      border-radius: 14px; padding: 11px 8px; font-size: 13px; font-family: inherit;
      color: var(--text); outline: none; text-align: center; transition: border-color 0.2s;
    }
    .qty-input:focus { border-color: var(--primary); }
    .qty-input::placeholder { color: var(--text-light); opacity: 0.6; font-size: 12px; }
    .add-btn {
      width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border: none; color: white; font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(255,140,105,0.4); transition: opacity 0.15s, transform 0.15s;
    }
    .add-btn:active { opacity: 0.82; transform: scale(0.92); }

    /* ── Category Tabs ── */
    .category-scroll {
      display: flex; gap: 6px; padding: 10px 16px 0;
      overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--card);
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: 12px; font-weight: 600; color: var(--text-light);
      cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit;
    }
    .cat-tab.active {
      background: var(--primary); border-color: var(--primary); color: white;
    }
    .cat-tab:active { transform: scale(0.94); }

    /* ── Suggestion Chips ── */
    .suggestion-area {
      background: var(--card);
      padding: 8px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .suggestion-area.hidden { display: none; }
    .suggestion-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .sugg-chip {
      padding: 6px 13px; border-radius: 20px;
      background: var(--primary-light); border: 1.5px solid var(--primary-light);
      color: var(--primary-dark); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      white-space: nowrap;
    }
    .sugg-chip:active { background: var(--primary); color: white; transform: scale(0.94); }
    .sugg-chip.custom { background: #F0EAF8; border-color: #DDD0F0; color: #6A4C9C; }

    /* ── Filter Tabs ── */
    .filter-tabs {
      display: flex; gap: 6px; padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .filter-tab {
      flex: 1; padding: 8px 6px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text-light);
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .filter-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .filter-tab:active { opacity: 0.8; }
    .f-badge {
      font-size: 10px; padding: 1px 5px; border-radius: 8px;
      background: rgba(255,255,255,0.3);
    }
    .filter-tab:not(.active) .f-badge { background: var(--primary-light); color: var(--primary); }

    /* ── List ── */
    .list-wrap {
      padding: 10px 16px;
      padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
    }
    .list-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-light);
      letter-spacing: 0.8px; text-transform: uppercase; padding: 6px 2px 5px;
    }
    .item-card {
      background: var(--card); border-radius: 14px; padding: 12px 12px;
      margin-bottom: 7px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06); border: 1.5px solid var(--border);
      cursor: pointer; transition: transform 0.12s;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.checked { background: #F7F7F7; border-color: #E8E8E8; box-shadow: none; }
    .check-circle {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      border: 2.5px solid var(--border); background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.18s;
    }
    .item-card.wan-item .check-circle { border-color: var(--wan); }
    .item-card.nyan-item .check-circle { border-color: var(--nyan); }
    .item-card.checked .check-circle { background: #4CD964; border-color: #4CD964; color: white; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 15px; font-weight: 600; color: var(--text); word-break: break-all; }
    .item-card.checked .item-name { color: #BBBBBB; text-decoration: line-through; }
    .item-meta { font-size: 11px; color: var(--text-light); margin-top: 3px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .item-card.checked .item-meta { opacity: 0.45; }
    .who-badge {
      font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 8px;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .who-badge.wan { background: var(--wan-light); color: var(--wan); }
    .who-badge.nyan { background: var(--nyan-light); color: var(--nyan); }
    .del-btn {
      width: 30px; height: 30px; border-radius: 10px; flex-shrink: 0;
      background: #FFF0EE; border: none; color: #FF6B6B; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .del-btn:active { background: #FFCCC8; }

    /* ── Empty ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 50px 20px; gap: 10px; color: var(--text-light);
    }
    .empty-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; opacity: 0.5; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); opacity: 0.4; }
    .empty-sub { font-size: 13px; text-align: center; opacity: 0.55; line-height: 1.6; }

    /* ── Bottom Bar ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      padding: 8px 20px; padding-bottom: max(8px, env(safe-area-inset-bottom));
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06); z-index: 50;
    }
    .stats { display: flex; gap: 10px; }
    .stat { text-align: center; }
    .stat-val { font-size: 17px; font-weight: 800; }
    .stat-val.c-all { color: var(--primary); }
    .stat-val.c-wan { color: var(--wan); }
    .stat-val.c-nyan { color: var(--nyan); }
    .stat-val.c-done { color: #4CD964; }
    .stat-lbl { font-size: 10px; color: var(--text-light); margin-top: 1px; }
    .clear-btn {
      background: #FFF0EE; border: 1.5px solid #FFD0CC;
      border-radius: 12px; padding: 7px 12px;
      font-size: 12px; font-weight: 600; color: #FF6B6B;
      font-family: inherit; cursor: pointer;
    }
    .clear-btn:active { background: #FFCCC8; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: max(76px, calc(76px + env(safe-area-inset-bottom)));
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(61,43,31,0.92); color: white;
      padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.28s; pointer-events: none; white-space: nowrap; z-index: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="dogcat.jpg.png" alt="わんにゃん" class="header-img">
      <div>
        <div class="header-title">🛒 わんにゃんお買い物</div>
        <div class="header-subtitle">ふたりのお買い物メモ</div>
      </div>
    </div>
    <button class="sync-badge" id="sync-status" onclick="doRefresh()">🔄</button>
  </header>

  <!-- Input Panel -->
  <div class="input-panel">
    <!-- わん / にゃん 切替 -->
    <div class="user-toggle-row">
      <button class="user-btn wan active" id="btn-wan" onclick="setUser('wan')">
        <img src="dog.jpg.png" alt="わん" id="img-wan">
        <span class="user-btn-label">🐶 わん</span>
      </button>
      <button class="user-btn nyan" id="btn-nyan" onclick="setUser('nyan')">
        <img src="cat.jpg.png" alt="にゃん" id="img-nyan">
        <span class="user-btn-label">🐱 にゃん</span>
      </button>
    </div>
    <!-- テキスト入力 -->
    <div class="input-row">
      <input type="text" class="text-input" id="item-input"
        placeholder="🐶 わん：買い物を追加..." maxlength="40"
        onkeydown="if(event.key==='Enter')addItem()">
      <input type="text" class="qty-input" id="qty-input"
        placeholder="数量" maxlength="8"
        onkeydown="if(event.key==='Enter')addItem()">
      <button class="add-btn" onclick="addItem()">＋</button>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="category-scroll" id="cat-tabs"></div>

  <!-- Suggestion Chips -->
  <div class="suggestion-area hidden" id="sugg-area">
    <div class="suggestion-wrap" id="sugg-wrap"></div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" id="ftab-all" onclick="setFilter('all')">
      全部 <span class="f-badge" id="fb-all">0</span>
    </button>
    <button class="filter-tab" id="ftab-wan" onclick="setFilter('wan')">
      🐶わん <span class="f-badge" id="fb-wan">0</span>
    </button>
    <button class="filter-tab" id="ftab-nyan" onclick="setFilter('nyan')">
      🐱にゃん <span class="f-badge" id="fb-nyan">0</span>
    </button>
  </div>

  <!-- List -->
  <div class="list-wrap" id="list-wrap"></div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="stats">
      <div class="stat"><div class="stat-val c-all" id="sv-all">0</div><div class="stat-lbl">合計</div></div>
      <div class="stat"><div class="stat-val c-wan" id="sv-wan">0</div><div class="stat-lbl">🐶わん</div></div>
      <div class="stat"><div class="stat-val c-nyan" id="sv-nyan">0</div><div class="stat-lbl">🐱にゃん</div></div>
      <div class="stat"><div class="stat-val c-done" id="sv-done">0</div><div class="stat-lbl">✅完了</div></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <a href="./calendar.html" style="background:linear-gradient(135deg,#FF8C69,#FFB347);color:white;border-radius:16px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;">📅 カレンダー</a>
      <button class="clear-btn" onclick="clearDone()">完了削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script>
// ============================================================
// ★ 候補商品データ（ここを編集して候補を追加・変更できます）
// ============================================================
const SUGGESTIONS = {
  '日用品':     ['トイレットペーパー','ティッシュ','キッチンペーパー','食器用洗剤','洗濯洗剤','柔軟剤','お風呂洗剤','トイレ洗剤','ハンドソープ','シャンプー','コンディショナー','ボディソープ','歯みがき粉','歯ブラシ','ゴミ袋','ラップ','アルミホイル','ジップ袋','スポンジ','除菌シート'],
  '野菜・果物': ['キャベツ','レタス','白菜','玉ねぎ','じゃがいも','にんじん','きゅうり','トマト','ミニトマト','ピーマン','もやし','きのこ','えのき','しめじ','長ねぎ','大葉','バナナ','りんご','みかん','いちご'],
  '肉・魚':     ['牛肉','豚肉','鶏もも肉','鶏むね肉','ひき肉','ウインナー','ベーコン','ハム','卵','鮭','さば','刺身','アジ','しらす','ツナ缶'],
  '乳製品':     ['牛乳','ヨーグルト','チーズ','バター','卵','生クリーム'],
  'パン・お菓子':['食パン','ロールパン','菓子パン','ベーグル','クッキー','チョコ','せんべい','ポテトチップス','アイス'],
  '飲み物':     ['水','お茶','炭酸水','コーヒー','カフェラテ','ジュース','豆乳','ビール'],
  'ペット用品': ['ドッグフード','キャットフード','おやつ','猫砂','ペットシーツ','ウェットティッシュ','消臭袋'],
  'その他':     ['豆腐','納豆','うどん','パスタ','米','味噌','醤油','マヨネーズ','ケチャップ','カレールー'],
};

// カテゴリの表示順
const CATEGORY_ORDER = ['日用品','野菜・果物','肉・魚','乳製品','パン・お菓子','飲み物','ペット用品','その他'];

const CATEGORY_EMOJI = {
  '日用品':'🧴','野菜・果物':'🥦','肉・魚':'🥩','乳製品':'🧀',
  'パン・お菓子':'🍞','飲み物':'🧃','ペット用品':'🐾','その他':'📦',
};

// ============================================================
// State
// ============================================================
const STORAGE_KEY  = 'wannyan_shopping_v2';
const USER_KEY     = 'wannyan_user_v1';
const CUSTOM_SUGG_KEY = 'wannyan_custom_sugg_v1';
const ROOM_ID      = 'WANNYAN';

let items          = [];
let currentUser    = 'wan';
let currentCat     = '';   // '' = すべて
let currentFilter  = 'all';
let shoppingRef    = null;

// ============================================================
// Init
// ============================================================
function init() {
  loadLocal();
  currentUser = localStorage.getItem(USER_KEY) || 'wan';
  buildCatTabs();
  updateUserUI();
  renderList();
  startSync();
}

// ============================================================
// LocalStorage
// ============================================================
function loadLocal() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    items = raw.map(i => ({ ...i, id: String(i.id) }));
  } catch { items = []; }
}
function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

// Custom suggestions
function loadCustomSugg() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_SUGG_KEY)) || {}; } catch { return {}; }
}
function saveCustomSugg(data) { localStorage.setItem(CUSTOM_SUGG_KEY, JSON.stringify(data)); }

function getSuggestions(cat) {
  const base = SUGGESTIONS[cat] || [];
  const custom = loadCustomSugg()[cat] || [];
  return { base, custom };
}

// ============================================================
// User toggle
// ============================================================
function setUser(u) {
  currentUser = u;
  localStorage.setItem(USER_KEY, u);
  updateUserUI();
}

function updateUserUI() {
  document.getElementById('btn-wan').className  = 'user-btn wan'  + (currentUser === 'wan'  ? ' active' : '');
  document.getElementById('btn-nyan').className = 'user-btn nyan' + (currentUser === 'nyan' ? ' active' : '');
  document.getElementById('item-input').placeholder =
    (currentUser === 'wan' ? '🐶 わん：' : '🐱 にゃん：') + '買い物を追加...';
}

// ============================================================
// Category tabs
// ============================================================
function buildCatTabs() {
  const wrap = document.getElementById('cat-tabs');
  let html = `<button class="cat-tab active" onclick="selectCat(this,'')">🛒 すべて</button>`;
  CATEGORY_ORDER.forEach(c => {
    html += `<button class="cat-tab" onclick="selectCat(this,'${c}')">${CATEGORY_EMOJI[c]||''} ${c}</button>`;
  });
  wrap.innerHTML = html;
}

function selectCat(el, cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSuggestions();
}

// ============================================================
// Suggestion chips
// ============================================================
function renderSuggestions() {
  const area = document.getElementById('sugg-area');
  const wrap = document.getElementById('sugg-wrap');
  if (!currentCat) { area.classList.add('hidden'); return; }
  area.classList.remove('hidden');
  const { base, custom } = getSuggestions(currentCat);
  let html = base.map(s =>
    `<button class="sugg-chip" onclick="addFromSugg('${esc(s)}')">${s}</button>`
  ).join('');
  if (custom.length) {
    html += custom.map(s =>
      `<button class="sugg-chip custom" onclick="addFromSugg('${esc(s)}')">${s}</button>`
    ).join('');
  }
  wrap.innerHTML = html || '<span style="font-size:13px;color:var(--text-light)">候補なし</span>';
}

function addFromSugg(name) {
  quickAdd(name, '');
  showToast((currentUser === 'wan' ? '🐶' : '🐱') + ' 「' + name + '」を追加しました');
}

// ============================================================
// Add item
// ============================================================
function addItem() {
  const inp = document.getElementById('item-input');
  const qty = document.getElementById('qty-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  quickAdd(name, qty.value.trim());
  showToast((currentUser === 'wan' ? '🐶 わん' : '🐱 にゃん') + ' が「' + name + '」を追加');
  inp.value = ''; qty.value = '';
  inp.focus();
}

function quickAdd(name, qty) {
  let fbKey;
  if (shoppingRef) {
    fbKey = shoppingRef.push().key;
  } else {
    fbKey = 'i' + Date.now() + Math.floor(Math.random() * 1000);
  }
  const item = {
    fbKey, id: fbKey, name, qty,
    category: currentCat || '',
    user: currentUser, checked: false,
    createdTimestamp: Date.now(),
    createdAt: new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' })
  };
  items.unshift(item);
  saveLocal(); renderList();
  if (shoppingRef) {
    setSyncStatus('syncing');
    shoppingRef.child(fbKey).set(item).then(() => setSyncStatus('ok')).catch(() => setSyncStatus('error'));
  }
}

// ============================================================
// Filter tabs
// ============================================================
function setFilter(f) {
  currentFilter = f;
  ['all','wan','nyan'].forEach(k => {
    document.getElementById('ftab-' + k).className =
      'filter-tab' + (k === f ? ' active' : '');
  });
  renderList();
}

// ============================================================
// Toggle check / delete
// ============================================================
function toggleCheck(id) {
  const it = items.find(i => i.id === id); if (!it) return;
  it.checked = !it.checked;
  if (it.checked) it.checkedAt = new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
  saveLocal(); renderList();
  if (shoppingRef && it.fbKey) shoppingRef.child(it.fbKey).update(it);
}
function deleteItem(id, e) {
  e.stopPropagation();
  const it = items.find(i => i.id === id);
  if (it && shoppingRef && it.fbKey) shoppingRef.child(it.fbKey).remove();
  items = items.filter(i => i.id !== id);
  saveLocal(); renderList();
  showToast('削除しました');
}
function clearDone() {
  const done = items.filter(i => i.checked);
  const n = done.length;
  if (!n) { showToast('完了済みはありません'); return; }
  if (!confirm(n + '件の完了済みを削除しますか？')) return;
  if (shoppingRef) {
    const updates = {};
    done.forEach(i => { if (i.fbKey) updates[i.fbKey] = null; });
    shoppingRef.update(updates);
  }
  items = items.filter(i => !i.checked);
  saveLocal(); renderList();
  showToast('✅ ' + n + '件削除しました');
}

// ============================================================
// Render list
// ============================================================
function renderList() {
  const wrap = document.getElementById('list-wrap');
  let filtered = items.slice();
  if (currentFilter === 'wan')  filtered = filtered.filter(i => i.user === 'wan');
  if (currentFilter === 'nyan') filtered = filtered.filter(i => i.user === 'nyan');

  const unchecked = filtered.filter(i => !i.checked);
  const checked   = filtered.filter(i => i.checked);

  // Stats
  const unc = items.filter(i => !i.checked);
  document.getElementById('sv-all').textContent  = unc.length;
  document.getElementById('sv-wan').textContent  = unc.filter(i => i.user === 'wan').length;
  document.getElementById('sv-nyan').textContent = unc.filter(i => i.user === 'nyan').length;
  document.getElementById('sv-done').textContent = items.filter(i => i.checked).length;
  document.getElementById('fb-all').textContent  = unc.length;
  document.getElementById('fb-wan').textContent  = unc.filter(i => i.user === 'wan').length;
  document.getElementById('fb-nyan').textContent = unc.filter(i => i.user === 'nyan').length;

  if (!unchecked.length && !checked.length) {
    wrap.innerHTML = `<div class="empty-state">
      <img src="${currentUser==='wan'?'dog.jpg.png':'cat.jpg.png'}" class="empty-img" alt="">
      <div class="empty-title">リストは空です</div>
      <div class="empty-sub">上の入力か候補から<br>追加してみよう！</div>
    </div>`; return;
  }

  let html = '';
  if (unchecked.length) {
    html += `<div class="list-section-title">📋 未購入 (${unchecked.length}件)</div>`;
    unchecked.forEach(it => { html += itemHTML(it); });
  }
  if (checked.length) {
    html += `<div class="list-section-title" style="margin-top:14px">✅ 購入済み (${checked.length}件)</div>`;
    checked.forEach(it => { html += itemHTML(it); });
  }
  wrap.innerHTML = html;
}

function itemHTML(it) {
  const wan = it.user === 'wan';
  const qty = it.qty ? `<b style="margin-left:4px">${esc(it.qty)}</b>` : '';
  const cat = it.category ? `<span style="opacity:.6">${it.category}</span>` : '';
  const eid = esc(String(it.id));
  return `<div class="item-card ${it.checked?'checked':''} ${wan?'wan':'nyan'}-item" onclick="toggleCheck('${eid}')">
    <div class="check-circle">${it.checked?'✓':''}</div>
    <div class="item-body">
      <div class="item-name">${esc(it.name)}${qty}</div>
      <div class="item-meta">
        <span class="who-badge ${wan?'wan':'nyan'}">${wan?'🐶 わん':'🐱 にゃん'}</span>
        <span>${it.createdAt}</span>${cat}
      </div>
    </div>
    <button class="del-btn" onclick="deleteItem('${eid}',event)">✕</button>
  </div>`;
}

// Sync (Firebase Realtime Database)
// ============================================================

  apiKey: "AIzaSyAi7KxYhQEoxqQf7E8r-1kXWU6WcvQow6I",
  authDomain: "wannyanmanma.firebaseapp.com",
  databaseURL: "https://wannyanmanma-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wannyanmanma",
  storageBucket: "wannyanmanma.firebasestorage.app",
  messagingSenderId: "671037449294",
  appId: "1:671037449294:web:327ca939dcc1af1eb84f1f"
};

function itemFbKey(item) {
  return item.fbKey || ('i' + String(Math.floor(Number(item.id) || 0)).slice(-13));
}

function connectFirebase() {
  const db = firebase.database();
  shoppingRef = db.ref('shopping/WANNYAN');
  shoppingRef.on('value', snap => {
    const data = snap.val();
    if (data === null) {
      if (items.length > 0) {
        const batch = {};
        items.forEach(item => {
          const k = itemFbKey(item);
          item.fbKey = k; item.id = k;
          batch[k] = item;
        });
        shoppingRef.set(batch).catch(() => {});
      }
    } else {
      const incoming = Object.values(data).sort((a, b) => {
        const ta = a.createdTimestamp || Math.floor(Number(a.id) || 0);
        const tb = b.createdTimestamp || Math.floor(Number(b.id) || 0);
        return tb - ta;
      });
      items = incoming;
      saveLocal(); renderList();
    }
    setSyncStatus('ok');
  }, () => { setSyncStatus('offline'); loadLocal(); renderList(); });
}

function startSync() {
  if (!window.firebase) { setSyncStatus('offline'); return; }
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        connectFirebase();
      } else {
        // Auth state not yet set – will retry when user logs in via calendar
        setSyncStatus('offline');
      }
    });
  } catch(e) { setSyncStatus('offline'); }
}

function doRefresh() {
  const btn = document.getElementById('sync-status');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 400);
  if (shoppingRef) {
    shoppingRef.once('value', snap => {
      const data = snap.val();
      if (data) {
        items = Object.values(data).sort((a, b) => {
          const ta = a.createdTimestamp || Math.floor(Number(a.id) || 0);
          const tb = b.createdTimestamp || Math.floor(Number(b.id) || 0);
          return tb - ta;
        });
        saveLocal(); renderList();
      }
      showToast('更新しました！');
    });
  } else {
    loadLocal(); renderList();
    showToast('更新しました！');
  }
}

function setSyncStatus(s) {
  // sync status no longer shown; button stays as 🔄
}

// ============================================================
// Utils
// ============================================================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
init();
</script>
