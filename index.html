<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わんにゃんお買い物">
  <meta name="theme-color" content="#FF8C69">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>わんにゃんお買い物メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --papa: #4A90D9;
      --papa-light: #C8E0F8;
      --mama: #E05C9A;
      --mama-light: #F8C8E0;
      --primary: #FF8C69;
      --primary-light: #FFD4C2;
      --accent: #FFB347;
      --bg: #FFF8F5;
      --card: #FFFFFF;
      --text: #3D2B1F;
      --text-light: #8B6959;
      --border: #F0D5C8;
      --radius: 16px;
      --checked-bg: #F5F5F5;
      --checked-text: #BBBBBB;
    }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* ===== MAIN APP ===== */
    #app { display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(255,140,105,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .pet-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-title { font-size: 16px; font-weight: 800; color: white; letter-spacing: 0.3px; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .header-subtitle { font-size: 10px; color: rgba(255,255,255,0.85); margin-top: 1px; }

    /* User toggle button in add bar */
    .user-toggle-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 2.5px solid var(--papa);
      background: var(--papa-light);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    .user-toggle-btn.mama {
      border-color: var(--mama);
      background: var(--mama-light);
    }
    .user-toggle-btn:active { transform: scale(0.88); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px 0;
      background: var(--bg);
    }
    .tab {
      flex: 1;
      padding: 9px 8px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    .tab:active { opacity: 0.8; }
    .tab-badge {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
    }
    .tab:not(.active) .tab-badge {
      background: var(--primary-light);
      color: var(--primary);
    }

    /* Add Item Bar */
    .add-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .add-input {
      flex: 1;
      background: white;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--primary); }
    .add-input::placeholder { color: var(--text-light); opacity: 0.6; }
    .add-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border: none;
      color: white;
      font-size: 24px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(255,140,105,0.4);
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .add-btn:active { opacity: 0.85; transform: scale(0.93); }

    /* List */
    .list-container {
      flex: 1;
      padding: 12px 16px;
      padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .list-section-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 8px 4px 6px;
    }

    .item-card {
      background: white;
      border-radius: 14px;
      padding: 14px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .item-card.checked {
      background: var(--checked-bg);
      border-color: #E8E8E8;
      box-shadow: none;
    }
    .item-card:active { transform: scale(0.98); }

    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .item-card.checked .item-check {
      background: #4CD964;
      border-color: #4CD964;
      color: white;
      font-size: 14px;
    }
    .item-card.papa-item .item-check { border-color: var(--papa); }
    .item-card.mama-item .item-check { border-color: var(--mama); }

    .item-body { flex: 1; min-width: 0; }
    .item-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s;
      word-break: break-all;
    }
    .item-card.checked .item-name {
      color: var(--checked-text);
      text-decoration: line-through;
    }
    .item-meta {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-card.checked .item-meta { opacity: 0.5; }

    .item-user-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .item-user-badge.papa { background: var(--papa-light); color: var(--papa); }
    .item-user-badge.mama { background: var(--mama-light); color: var(--mama); }
    .item-card.checked .item-user-badge { opacity: 0.5; }

    .item-delete {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #FFF0EE;
      border: none;
      color: #FF6B6B;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .item-delete:active { background: #FFCCC8; }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-light);
      gap: 12px;
    }
    .empty-icon { font-size: 64px; opacity: 0.6; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--text); opacity: 0.5; }
    .empty-sub { font-size: 13px; text-align: center; opacity: 0.6; line-height: 1.5; }

    /* Bottom Bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      z-index: 50;
    }
    .stat-group { display: flex; gap: 20px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 18px; font-weight: 800; }
    .stat-value.papa-color { color: var(--papa); }
    .stat-value.mama-color { color: var(--mama); }
    .stat-value.total-color { color: var(--primary); }
    .stat-label { font-size: 10px; color: var(--text-light); margin-top: 1px; }

    .clear-done-btn {
      background: #FFF0EE;
      border: 1.5px solid #FFD0CC;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #FF6B6B;
      font-family: inherit;
      cursor: pointer;
    }
    .clear-done-btn:active { background: #FFCCC8; }

    /* Category input */
    .category-selector {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .category-selector::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-chip.selected {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .cat-chip:active { transform: scale(0.95); }

    /* Note/quantity add */
    .add-bar-extended {
      padding: 0 16px 10px;
      display: flex;
      gap: 8px;
    }
    .add-input-small {
      flex: 1;
      background: white;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
    }
    .add-input-small:focus { border-color: var(--primary); }
    .add-input-small::placeholder { color: var(--text-light); opacity: 0.6; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(61,43,31,0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 500;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Swipe hint */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<!-- Main App -->
<div id="app">
  <header class="header">
    <div class="header-left">
      <img src="pets.jpg" alt="わんにゃん" class="pet-circle">
      <div>
        <div class="header-title">🛒 わんにゃんお買い物</div>
        <div class="header-subtitle">ふたりのお買い物メモ</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
      <span style="font-size:11px;font-weight:600;" id="sync-status">⟳ 接続中...</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:rgba(255,255,255,0.8);">🔗</span>
        <span style="font-size:13px;font-weight:800;color:white;letter-spacing:1.5px;" id="room-code-display">------</span>
        <button onclick="copyRoomCode()" style="background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.4);border-radius:8px;padding:3px 8px;font-size:11px;font-weight:600;color:white;cursor:pointer;font-family:inherit;">コピー</button>
        <button onclick="showRoomModal()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:3px 8px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;font-family:inherit;">変更</button>
      </div>
    </div>
  </header>

  <!-- Category chips -->
  <div class="category-selector" id="category-chips">
    <div class="cat-chip selected" onclick="selectCategory(this, '')">すべて</div>
    <div class="cat-chip" onclick="selectCategory(this, '野菜・果物')">🥦 野菜・果物</div>
    <div class="cat-chip" onclick="selectCategory(this, '肉・魚')">🥩 肉・魚</div>
    <div class="cat-chip" onclick="selectCategory(this, '乳製品')">🧀 乳製品</div>
    <div class="cat-chip" onclick="selectCategory(this, 'パン・お菓子')">🍞 パン・お菓子</div>
    <div class="cat-chip" onclick="selectCategory(this, '飲み物')">🧃 飲み物</div>
    <div class="cat-chip" onclick="selectCategory(this, '日用品')">🧴 日用品</div>
    <div class="cat-chip" onclick="selectCategory(this, 'ペット用品')">🐾 ペット用品</div>
    <div class="cat-chip" onclick="selectCategory(this, 'その他')">📦 その他</div>
  </div>

  <!-- Add item -->
  <div class="add-bar">
    <button class="user-toggle-btn" id="user-toggle-btn" onclick="toggleUser()">🐶</button>
    <input type="text" class="add-input" id="item-input" placeholder="買い物を追加..." maxlength="40"
           onkeydown="if(event.key==='Enter') addItem()">
    <div class="add-input-small" style="max-width:76px">
      <input type="text" id="qty-input" placeholder="数量" style="width:100%;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);background:transparent;" maxlength="10">
    </div>
    <button class="add-btn" onclick="addItem()">＋</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-all" onclick="switchTab('all')">
      🛒 全部 <span class="tab-badge" id="badge-all">0</span>
    </button>
    <button class="tab" id="tab-papa" onclick="switchTab('papa')">
      🐶 わん <span class="tab-badge" id="badge-papa">0</span>
    </button>
    <button class="tab" id="tab-mama" onclick="switchTab('mama')">
      🐱 にゃん <span class="tab-badge" id="badge-mama">0</span>
    </button>
  </div>

  <!-- List -->
  <div class="list-container" id="list-container">
    <!-- Rendered by JS -->
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="stat-group">
      <div class="stat-item">
        <div class="stat-value total-color" id="stat-total">0</div>
        <div class="stat-label">合計</div>
      </div>
      <div class="stat-item">
        <div class="stat-value papa-color" id="stat-papa">0</div>
        <div class="stat-label">🐶 わん</div>
      </div>
      <div class="stat-item">
        <div class="stat-value mama-color" id="stat-mama">0</div>
        <div class="stat-label">🐱 にゃん</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" style="color:#4CD964" id="stat-done">0</div>
        <div class="stat-label">✅ 完了</div>
      </div>
    </div>
    <button class="clear-done-btn" onclick="clearDone()">完了削除</button>
  </div>
</div>

<!-- Room Modal -->
<div class="modal-overlay" id="room-modal" onclick="if(event.target===this)closeRoomModal()">
  <div class="modal" style="padding:28px 20px;">
    <div class="modal-handle"></div>
    <div class="modal-date">🔗 ルームコード設定</div>
    <p style="font-size:13px;color:var(--text-light);text-align:center;margin-bottom:20px;line-height:1.6;">
      パートナーと同じルームコードを入力すると<br>リストがリアルタイムで同期されます！
    </p>
    <div style="background:var(--bg);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;">
      <div style="font-size:11px;color:var(--text-light);margin-bottom:6px;">現在のルームコード</div>
      <div style="font-size:28px;font-weight:800;color:var(--primary);letter-spacing:4px;" id="room-modal-current"></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:8px;">パートナーのコードを入力</div>
    <input type="text" id="room-input" placeholder="例: ABC123"
      style="width:100%;background:white;border:2px solid var(--border);border-radius:14px;padding:14px;font-size:18px;font-weight:700;letter-spacing:3px;text-align:center;text-transform:uppercase;font-family:inherit;color:var(--text);outline:none;margin-bottom:14px;"
      maxlength="8" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRoomModal()">キャンセル</button>
      <button class="btn-save" onclick="applyRoomCode()">🔗 接続する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ===== STATE =====
  let currentUser = null;
  let currentTab = 'all';
  let currentCategory = '';
  let items = [];
  let roomId = null;
  let lastServerUpdatedAt = 0;
  let syncInterval = null;
  let isSyncing = false;

  const STORAGE_KEY = 'wannyan_shopping_v2';
  const USER_KEY = 'wannyan_user_v1';
  const ROOM_KEY = 'wannyan_room_v1';

  // ===== INIT =====
  function init() {
    loadLocal();
    roomId = localStorage.getItem(ROOM_KEY) || generateRoomId();
    localStorage.setItem(ROOM_KEY, roomId);
    currentUser = localStorage.getItem(USER_KEY) || 'papa';
    localStorage.setItem(USER_KEY, currentUser);
    showApp();
  }

  function generateRoomId() {
    return Math.random().toString(36).slice(2, 8).toUpperCase();
  }

  function loadLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      items = raw ? JSON.parse(raw) : [];
    } catch(e) { items = []; }
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  // ===== SYNC =====
  async function pushToServer() {
    if (!roomId) return;
    const updatedAt = Date.now();
    try {
      setSyncStatus('syncing');
      const res = await fetch(`/api/shopping?room=${roomId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items, updatedAt })
      });
      if (res.ok) {
        const data = await res.json();
        lastServerUpdatedAt = data.updatedAt || updatedAt;
        setSyncStatus('ok');
      } else {
        setSyncStatus('error');
      }
    } catch(e) {
      setSyncStatus('offline');
    }
  }

  async function pullFromServer() {
    if (!roomId || isSyncing) return;
    isSyncing = true;
    try {
      const res = await fetch(`/api/shopping?room=${roomId}`);
      if (!res.ok) { setSyncStatus('error'); return; }
      const data = await res.json();
      // Only update if server has newer data than what we last synced
      if (data.updatedAt && data.updatedAt > lastServerUpdatedAt) {
        items = data.items || [];
        lastServerUpdatedAt = data.updatedAt;
        saveLocal();
        renderList();
        setSyncStatus('ok');
      } else {
        setSyncStatus('ok');
      }
    } catch(e) {
      setSyncStatus('offline');
    } finally {
      isSyncing = false;
    }
  }

  function startSync() {
    pullFromServer(); // immediate first pull
    if (syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(pullFromServer, 5000); // poll every 5s
  }

  function setSyncStatus(status) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const map = {
      syncing: { text: '⟳ 同期中...', color: '#FFB347' },
      ok:      { text: '✓ 同期済み',  color: '#4CD964' },
      offline: { text: '✕ オフライン', color: '#FF6B6B' },
      error:   { text: '! エラー',    color: '#FF6B6B' }
    };
    const s = map[status] || map.ok;
    el.textContent = s.text;
    el.style.color = s.color;
  }

  // ===== USER =====
  function showApp() {
    updateUserUI();
    updateRoomUI();
    renderList();
    startSync();
  }

  function toggleUser() {
    currentUser = currentUser === 'papa' ? 'mama' : 'papa';
    localStorage.setItem(USER_KEY, currentUser);
    updateUserUI();
    showToast(currentUser === 'papa' ? '🐶 わんに切替えました' : '🐱 にゃんに切替えました');
  }

  function updateUserUI() {
    const isPapa = currentUser === 'papa';
    const btn = document.getElementById('user-toggle-btn');
    btn.textContent = isPapa ? '🐶' : '🐱';
    btn.className = 'user-toggle-btn' + (isPapa ? '' : ' mama');
    const input = document.getElementById('item-input');
    input.placeholder = (isPapa ? '🐶 わん：' : '🐱 にゃん：') + '買い物を追加...';
  }

  // ===== ROOM UI =====
  function updateRoomUI() {
    const el = document.getElementById('room-code-display');
    if (el) el.textContent = roomId;
  }

  function showRoomModal() {
    document.getElementById('room-modal').classList.add('open');
    document.getElementById('room-input').value = '';
    document.getElementById('room-modal-current').textContent = roomId;
  }

  function closeRoomModal() {
    document.getElementById('room-modal').classList.remove('open');
  }

  function applyRoomCode() {
    const code = document.getElementById('room-input').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
    if (!code || code.length < 4) { showToast('ルームコードを4文字以上入力してください'); return; }
    roomId = code;
    localStorage.setItem(ROOM_KEY, roomId);
    lastServerUpdatedAt = 0; // force re-pull
    items = [];
    saveLocal();
    updateRoomUI();
    closeRoomModal();
    startSync();
    showToast('🔗 ルームコード「' + roomId + '」に接続しました');
  }

  function copyRoomCode() {
    navigator.clipboard.writeText(roomId).then(() => {
      showToast('📋 ルームコード「' + roomId + '」をコピーしました！');
    }).catch(() => {
      showToast('ルームコード: ' + roomId);
    });
  }

  // ===== CATEGORIES =====
  function selectCategory(el, cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    renderList();
  }

  // ===== TABS =====
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderList();
  }

  // ===== ADD ITEM =====
  function addItem() {
    const input = document.getElementById('item-input');
    const qtyInput = document.getElementById('qty-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const qty = qtyInput.value.trim();
    const item = {
      id: Date.now() + Math.random(),
      name, qty,
      category: currentCategory || '',
      user: currentUser,
      checked: false,
      createdAt: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    };
    items.unshift(item);
    saveLocal();
    pushToServer();
    input.value = '';
    qtyInput.value = '';
    renderList();
    showToast((currentUser === 'papa' ? '🐶 わん' : '🐱 にゃん') + ' が「' + name + '」を追加しました');
    input.focus();
  }

  // ===== TOGGLE CHECK =====
  function toggleCheck(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.checked = !item.checked;
    if (item.checked) item.checkedAt = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    saveLocal();
    pushToServer();
    renderList();
  }

  // ===== DELETE =====
  function deleteItem(id, event) {
    event.stopPropagation();
    items = items.filter(i => i.id !== id);
    saveLocal();
    pushToServer();
    renderList();
    showToast('削除しました');
  }

  // ===== CLEAR DONE =====
  function clearDone() {
    const count = items.filter(i => i.checked).length;
    if (count === 0) { showToast('完了済みのアイテムはありません'); return; }
    if (!confirm(count + '件の完了済みアイテムを削除しますか？')) return;
    items = items.filter(i => !i.checked);
    saveLocal();
    pushToServer();
    renderList();
    showToast('✅ ' + count + '件削除しました');
  }

  // ===== RENDER =====
  function renderList() {
    const container = document.getElementById('list-container');
    let filtered = items.slice();
    if (currentTab === 'papa') filtered = filtered.filter(i => i.user === 'papa');
    if (currentTab === 'mama') filtered = filtered.filter(i => i.user === 'mama');
    if (currentCategory) filtered = filtered.filter(i => i.category === currentCategory);

    const unchecked = filtered.filter(i => !i.checked);
    const checked = filtered.filter(i => i.checked);

    const allUnchecked = items.filter(i => !i.checked);
    document.getElementById('stat-total').textContent = allUnchecked.length;
    document.getElementById('stat-papa').textContent = allUnchecked.filter(i => i.user === 'papa').length;
    document.getElementById('stat-mama').textContent = allUnchecked.filter(i => i.user === 'mama').length;
    document.getElementById('stat-done').textContent = items.filter(i => i.checked).length;
    document.getElementById('badge-all').textContent = items.filter(i => !i.checked).length;
    document.getElementById('badge-papa').textContent = items.filter(i => i.user === 'papa' && !i.checked).length;
    document.getElementById('badge-mama').textContent = items.filter(i => i.user === 'mama' && !i.checked).length;

    if (unchecked.length === 0 && checked.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${currentUser === 'papa' ? '🐶' : '🐱'}</div>
          <div class="empty-title">買い物リストは空です</div>
          <div class="empty-sub">上の入力欄から<br>買い物を追加してみよう！</div>
        </div>`;
      return;
    }

    let html = '';
    if (unchecked.length > 0) {
      html += `<div class="list-section-header">📋 未購入 (${unchecked.length}件)</div>`;
      unchecked.forEach(item => { html += renderItem(item); });
    }
    if (checked.length > 0) {
      html += `<div class="list-section-header" style="margin-top:16px">✅ 購入済み (${checked.length}件)</div>`;
      checked.forEach(item => { html += renderItem(item); });
    }
    container.innerHTML = html;
  }

  function renderItem(item) {
    const isPapa = item.user === 'papa';
    const icon = isPapa ? '🐶' : '🐱';
    const userName = isPapa ? 'わん' : 'にゃん';
    const userClass = isPapa ? 'papa' : 'mama';
    const checkedClass = item.checked ? 'checked' : '';
    const itemUserClass = isPapa ? 'papa-item' : 'mama-item';
    const checkContent = item.checked ? '✓' : '';
    const catLabel = item.category ? `<span style="margin-left:4px;opacity:0.6">${item.category}</span>` : '';
    const qtyLabel = item.qty ? `<span style="margin-left:4px;font-weight:700">${item.qty}</span>` : '';

    return `
      <div class="item-card ${checkedClass} ${itemUserClass}" onclick="toggleCheck(${item.id})">
        <div class="item-check">${checkContent}</div>
        <div class="item-body">
          <div class="item-name">${escapeHtml(item.name)}${qtyLabel}</div>
          <div class="item-meta">
            <span class="item-user-badge ${userClass}">${icon} ${userName}</span>
            <span>${item.createdAt}</span>
            ${catLabel}
          </div>
        </div>
        <button class="item-delete" onclick="deleteItem(${item.id}, event)">✕</button>
      </div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== TOAST =====
  let toastTimeout;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ===== SERVICE WORKER =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ===== START =====
  init();
</script>
</body>
</html>
